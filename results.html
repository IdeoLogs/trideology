    <img src="essence-test.png" class="center">

    <img src="" id="banner"></canvas></br>
    <p style="text-align:center;margin:-2px auto">Hint: you can download this image directly. No need to screenshot!</p></br>
    <button class="button" onclick="location.href='index.html';" style="background-color: #2196f3;">Back</button> <br>
	
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        lib_axis  = parseFloat(urlParams.get("lib"))
        pat_axis  = parseFloat(urlParams.get("pat"))
        com_axis  = parseFloat(urlParams.get("com"))
        
        xaxis = (0.5 * lib_axis) - (0.5 * com_axis)
        yaxis = pat_axis - (((0.5) * com_axis) + ((0.5) * lib_axis))
        c = 10
    
        window.onload = function() {
            var background = new Image();
            background.onload = function() {
                var c = document.createElement("canvas");
                c.width = 1850;
                c.height = 1600;
                var ctx = c.getContext("2d");
                ctx.fillStyle = "#EEEEEE"
                ctx.fillRect(0, 0, 1850, 1600);
                ctx.drawImage(background, 0, 0);
    
                var dot = c.getContext("2d");
                dot.beginPath();
                dot.arc((xaxis ** 2) + 700, -(yaxis ** 2) + 650, 25, 0, 2 * Math.PI);
                dot.fillStyle = 'red';
                dot.fill();
                dot.stroke();

    
                ctx.font="50px Montserrat"
                ctx.textAlign="center"
                ctx.fillStyle="#222222"
                ctx.textAlign="right"
                ctx.font="60px Montserrat"
    
                document.getElementById("banner").src = c.toDataURL();
            }
            background.src = "./compass.png";
        }
        </script>
    </body>
